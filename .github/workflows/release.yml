name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  version:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: v
        run: echo "version=$(perl .github/workflows/scripts/version.pl)" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
      release-kind: release
      changelog-flag: --release ${{ github.ref_name }}

  publish:
    needs: [version, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.win-artifact }}",   path: dist }
      - uses: actions/download-artifact@v4
        with: { name: "${{ needs.build.outputs.linux-artifact }}", path: dist }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: |
            ## DupMerge v${{ needs.version.outputs.version }}

            Self-contained single-file net7.0 binaries:
            - **win-x64** — `DupMerge.exe`
            - **linux-x64** — `DupMerge`

            Merges duplicate files into hardlinks or symlinks.
          files: dist/*.zip
          generate_release_notes: true
